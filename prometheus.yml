# Prometheus Configuration
# Scrapes metrics from backend and OpenTelemetry Collector

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'finans-portal'
    environment: 'dev'

# Alertmanager configuration (optional, can be added later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Spring Boot Backend - Actuator Prometheus endpoint
  - job_name: 'finans-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'finans-backend'
          application: 'backend'
          environment: 'dev'

  # OpenTelemetry Collector - Prometheus exporter
  - job_name: 'otel-collector'
    scrape_interval: 10s
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: 'otel-collector'
          application: 'observability'

  # OpenTelemetry Collector - Internal metrics
  - job_name: 'otel-collector-internal'
    scrape_interval: 30s
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          service: 'otel-collector-internal'
          application: 'observability'
