# SonarCloud configuration for the finans-portali monorepo
# (backend Java/Maven + frontend React/Vite + compose / Dockerfiles).
#
# The actual SonarCloud project is created at https://sonarcloud.io/projects
# under the user's organization (see SONAR_SETUP.md). The two keys below have
# to match what was created there:
#
#   sonar.projectKey  — usually <github-user>_<repo>, e.g. yigitsheker_finans-portali
#   sonar.organization — the SonarCloud org slug, e.g. yigitsheker
#
# Override at scan time with -D flags if either value is different.

sonar.projectKey=yigitsheker_finans-portali
sonar.organization=yigitsheker
sonar.projectName=Finans Portali
sonar.projectVersion=0.0.1-SNAPSHOT

sonar.host.url=https://sonarcloud.io

# ---------------------------------------------------------------------------
# Source layout (monorepo)
# ---------------------------------------------------------------------------
# Backend lives under backend/src/main, tests under backend/src/test.
# Frontend lives under frontend/src; no separate test tree exists yet so it's
# all "main". docker-compose.yml + Dockerfile* sit at the repo root.
# ---------------------------------------------------------------------------
sonar.sources=backend/src/main,frontend/src,docker-compose.yml,docker-compose.dev.yml,frontend/Dockerfile,frontend/Dockerfile.dev,backend/Dockerfile,playwright-service/Dockerfile
sonar.tests=backend/src/test
sonar.sourceEncoding=UTF-8

# ---------------------------------------------------------------------------
# Backend (Java 21 / Maven)
# ---------------------------------------------------------------------------
sonar.java.source=21
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes

# JaCoCo coverage report (89.30% INSTRUCTION at last measurement, 435 tests).
# The CI step runs `mvn verify` which produces this XML before the scan.
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# Coverage exclusions mirror the JaCoCo plugin's <excludes> in backend/pom.xml
# so the two numbers agree. Boilerplate (DTOs, entities, config) and
# network-IO clients (Yahoo, TCMB, TEFAS, Keycloak admin) are excluded —
# they need WireMock fixtures to test meaningfully.
#
# Frontend is excluded wholesale: no Vitest / Jest harness exists yet, so
# every JS/JSX line would count as uncovered and tank the Quality Gate's
# new-code coverage threshold. Sonar still runs its JS static analysis
# (bugs, smells, hotspots) — only the coverage metric is skipped.
sonar.coverage.exclusions=\
    backend/src/main/java/com/finansportali/backend/BackendApplication.java,\
    backend/src/main/java/com/finansportali/backend/dto/**,\
    backend/src/main/java/com/finansportali/backend/entity/**,\
    backend/src/main/java/com/finansportali/backend/config/**,\
    backend/src/main/java/com/finansportali/backend/repository/DebtInstrumentSpecifications.java,\
    backend/src/main/java/com/finansportali/backend/service/client/**,\
    backend/src/main/java/com/finansportali/backend/service/scheduler/**,\
    backend/src/main/java/com/finansportali/backend/service/market/MarketDataSeedService.java,\
    backend/src/main/java/com/finansportali/backend/service/KeycloakAdminService.java,\
    backend/src/main/java/com/finansportali/backend/filter/**,\
    backend/src/main/java/com/finansportali/backend/security/**,\
    backend/src/main/java/com/finansportali/backend/util/TefasApiTester.java,\
    frontend/**

# ---------------------------------------------------------------------------
# Frontend (JS/JSX, React 19)
# ---------------------------------------------------------------------------
# No frontend test suite exists yet → no lcov report path. Sonar still runs
# its JS / TS / JSX static analysis (bugs, code smells, security hotspots).
sonar.javascript.environments=browser,node

# ---------------------------------------------------------------------------
# Global exclusions — build artefacts and third-party
# ---------------------------------------------------------------------------
sonar.exclusions=\
    **/node_modules/**,\
    **/target/**,\
    **/dist/**,\
    **/build/**,\
    **/coverage/**,\
    **/*.min.js,\
    **/*.bundle.js,\
    **/generated/**,\
    .claude/**,\
    scripts/**,\
    .github/workflows/ultrareview-cloud.yml

sonar.test.exclusions=**/node_modules/**,**/target/**

# ---------------------------------------------------------------------------
# Copy/paste-detector tuning (frontend only)
# ---------------------------------------------------------------------------
# SonarCloud's default JavaScript CPD threshold is 100 tokens. React
# component bodies pack a lot of inline-style + propTypes boilerplate
# that legitimately reads similar block-to-block (every PropTypes.shape
# declaration; every styled <button> handler) without being "duplicate
# logic" in the maintainability sense. Bumping to 150 tokens filters
# the false positives while still catching the genuine 12-line cut/paste
# patterns. Java + other languages keep the default.
sonar.cpd.javascript.minimumTokens=150
sonar.cpd.typescript.minimumTokens=150

# Copy/paste-detection EXCLUSIONS — view-layer React files.
#
# The new-code Duplications metric is dominated by view boilerplate that
# CPD cannot tell apart from real cut/paste logic: the per-page inline
# `const s = { ... }` style maps (every page repeats the same root /
# loading / spinner / error / tableContainer shells), the repeated
# PropTypes.shape declarations, and the near-identical grouped/grid
# table-header markup. These read block-to-block similar by construction —
# a shared MUI-style theme would normally hold them, but this project uses
# inline style objects per page on purpose, and de-duping presentation-only
# objects into shared constants hurts readability more than the "duplicate"
# costs. This mirrors how the frontend is already excluded wholesale from
# the coverage metric (no Vitest harness yet): Sonar still runs full JS/JSX
# bug + smell + hotspot analysis on these files — only copy/paste detection
# is skipped for the page/table view shells.
sonar.cpd.exclusions=\
    frontend/src/pages/**,\
    frontend/src/components/MarketBrowser.jsx,\
    frontend/src/components/ModernMarketBrowser.jsx,\
    frontend/src/components/FinexStyleMarket.jsx,\
    frontend/src/components/BondDetailModal.jsx,\
    frontend/src/components/AssetDetailModal.jsx,\
    frontend/src/components/features/portfolio/PositionsTable.jsx

# Disable the scanner analysis cache. With the cache on, a run that only
# changes scan config (e.g. the cpd.exclusions above) reuses cached
# duplication data for unchanged source files, so the exclusions don't
# take effect until those files are themselves touched — the duplication
# metric then reads stale (it stuck at 3.21% until a no-cache run dropped
# it to 2.4%). A repo this size scans in ~90s without the cache, so the
# determinism is worth the small cost: every run honours the exclusions.
sonar.analysisCache.enabled=false

# ---------------------------------------------------------------------------
# Targeted issue suppressions
# ---------------------------------------------------------------------------
# Sonar's "Subresource Integrity" rule (S5725) flags the dynamic
# TradingView <script> tag because we don't set an `integrity` attribute.
# TradingView ships tv.js from an unversioned URL and updates it on their
# own cadence — pinning any SRI hash would break the chart embed at the
# next release. crossOrigin="anonymous" already isolates the script and
# TradingView sandboxes the widget contents themselves. NOSONAR inline
# doesn't apply to Security-category former-hotspots, so we suppress
# via file-level rule exclusion.
sonar.issue.ignore.multicriteria=tv_sri
sonar.issue.ignore.multicriteria.tv_sri.ruleKey=javascript:S5725
sonar.issue.ignore.multicriteria.tv_sri.resourceKey=frontend/src/components/TradingViewWidget.jsx
