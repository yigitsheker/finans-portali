spring:
  application:
    name: finans-backend
  # Multi-thread scheduler. Default pool size is 1, which serialises every
  # @Scheduled method — news fetch (~150 s) ends up blocking price refresh
  # for minutes. Pool of 4 lets news/bond/price/inflation tasks run in
  # parallel without piling up.
  task:
    scheduling:
      pool:
        size: 4
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8090/realms/finans/protocol/openid-connect/certs
          issuer-uri: http://localhost:8090/realms/finans
  datasource:
    # Datasource credentials are read from the Spring-standard env vars
    # SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD. The defaults match the
    # docker-compose dev stack so local `./mvnw spring-boot:run` keeps working
    # out of the box; production overrides via env (Sonar S6437 — no literal
    # secrets in source).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finans}
    username: ${SPRING_DATASOURCE_USERNAME:finans}
    password: ${SPRING_DATASOURCE_PASSWORD:finans}
  jpa:
    hibernate:
      ddl-auto: update  # Temporarily set to update to fix schema mismatches
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
            required: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

app:
  keycloak:
    server-url: ${APP_KEYCLOAK_SERVER_URL:http://localhost:8090}
    realm: ${APP_KEYCLOAK_REALM:finans}
    admin-client-id: ${APP_KEYCLOAK_ADMIN_CLIENT_ID:finans-backend-admin}
    admin-client-secret: ${APP_KEYCLOAK_ADMIN_CLIENT_SECRET:finans-backend-admin-secret}
  # TCMB EVDS3 persistent API key (preferred over session cookies). The fetchers
  # (deposit rates, inflation, bond yields) read app.evds.api-key; without this
  # mapping the EVDS_API_KEY env var never reached Spring, so the api-key auth
  # path was dead and they relied solely on short-lived session cookies.
  evds:
    api-key: ${APP_EVDS_API_KEY:}
  bonds:
    provider: ${BONDS_PROVIDER:TCMB}  # TCMB (real: politika faizi + Bigpara scrape), DEMO
    scheduler-enabled: ${BONDS_SCHEDULER_ENABLED:true}
    refresh-cron: ${BONDS_REFRESH_CRON:0 0 0/2 * * ?}  # Every 2 hours
    fallback-enabled: ${BONDS_FALLBACK_ENABLED:true}
    tcmb:
      # EVDS3 session-based auth (EVDS2 REST API is deprecated/redirects to EVDS3 SPA)
      base-url: https://evds3.tcmb.gov.tr/igmevdsms-dis/
      evds3-jsessionid: ${TCMB_EVDS3_JSESSIONID:}
      evds3-ts-cookie: ${TCMB_EVDS3_TS_COOKIE:}
  funds:
    provider: ${FUNDS_PROVIDER:TEFAS}  # TEFAS (real data source via JSON API)
    scheduler-enabled: ${FUNDS_SCHEDULER_ENABLED:true}
    refresh-cron: ${FUNDS_REFRESH_CRON:0 30 10,14,18 * * MON-FRI}  # 10:30, 14:30, 18:30 on weekdays
    max-funds-to-fetch: ${FUNDS_MAX_FETCH:1500}  # TEFAS has ~1008 active funds total
    rate-limit-delay-ms: ${FUNDS_RATE_LIMIT_DELAY:200}  # Reduced delay for API (faster than web scraping)
    retry-max-attempts: ${FUNDS_RETRY_MAX_ATTEMPTS:3}  # Max retry attempts for failed requests
    retry-initial-delay-ms: ${FUNDS_RETRY_INITIAL_DELAY:1000}  # Initial retry delay (ms)
    fallback-enabled: ${FUNDS_FALLBACK_ENABLED:false}  # Do not use sample data in production
    tefas:
      base-url: https://www.tefas.gov.tr
  fred:
    # FRED (Federal Reserve Economic Data) API key for US CPI history.
    # Get one free at https://fred.stlouisfed.org/docs/api/api_key.html.
    # If unset, the inflation refresh skips the US series and the /api/v1/
    # inflation?country=US endpoint returns whatever was persisted last.
    api-key: ${APP_FRED_API_KEY:}

  # Analysis-page AI chatbot. Configured to talk to any OpenAI-compatible
  # /v1/chat/completions endpoint, so the same code drives Groq (free) or
  # OpenAI. Leave `api-key` empty to fall back to the local mock responder
  # in AiAnalysisService.
  #
  # Defaults: Groq's free endpoint with llama-3.3-70b — sign up at
  # https://console.groq.com/keys, paste the gsk_... key into the
  # APP_LLM_API_KEY env var, and the chatbot starts answering for real.
  llm:
    base-url: ${APP_LLM_BASE_URL:https://api.groq.com/openai/v1}
    api-key:  ${APP_LLM_API_KEY:}
    model:    ${APP_LLM_MODEL:llama-3.3-70b-versatile}
    max-tokens: ${APP_LLM_MAX_TOKENS:600}
    temperature: ${APP_LLM_TEMPERATURE:0.4}
    timeout-seconds: ${APP_LLM_TIMEOUT_SECONDS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,configprops,beans,mappings
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    mail:
      enabled: false
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: finans-backend
      environment: ${spring.profiles.active:default}

# OpenTelemetry configuration
# Note: OpenTelemetry Java Agent is configured via environment variables in docker-compose.yml
# This section is for Spring Boot Actuator integration only
management.tracing:
  enabled: true
  sampling:
    probability: 1.0
  baggage:
    enabled: true
    correlation:
      enabled: true
    remote-fields:
      - userId
      - requestId

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security.oauth2.jwt: DEBUG
    com.finansportali: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  file:
    name: logs/finans-backend.log
    max-size: 100MB
    max-history: 30

server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param

---
# Docker profile
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/finans
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/finans/protocol/openid-connect/certs
          issuer-uri: http://localhost:8090/realms/finans