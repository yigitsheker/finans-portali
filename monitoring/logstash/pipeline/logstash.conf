input {
  beats {
    port => 5044
  }
  
  # Direct log file input
  file {
    path => "/app/logs/*.log"
    start_position => "beginning"
    codec => "json"
    tags => ["finans-backend"]
  }
}

filter {
  # Parse JSON logs
  if [message] {
    json {
      source => "message"
    }
  }
  
  # Add timestamp
  date {
    match => [ "timestamp", "ISO8601" ]
  }
  
  # Extract request information
  if [logger] == "com.finansportali.backend.config.LoggingConfig$RequestLoggingInterceptor" {
    grok {
      match => { "message" => "REQUEST: %{WORD:http_method} %{URIPATH:http_path}" }
      tag_on_failure => ["_grokparsefailure_request"]
    }
  }
  
  # Add service metadata
  mutate {
    add_field => { "service" => "finans-backend" }
    add_field => { "environment" => "docker" }
  }
}

output {
  opensearch {
    hosts => ["opensearch:9200"]
    index => "finans-logs-%{+YYYY.MM.dd}"
  }
  
  # Debug output
  stdout {
    codec => rubydebug
  }
}