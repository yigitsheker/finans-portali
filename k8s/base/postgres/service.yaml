apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  # Headless service for stable DNS — pods reach pg at postgres.NS.svc.cluster.local
  # (matches the docker-compose hostname "postgres" used in backend config).
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: pg
