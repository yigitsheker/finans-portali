# Template — copy to `secret.yaml`, fill real values, and `kubectl apply -f` it
# OUT-OF-BAND (not via kustomize) so real credentials never land in git. The
# kustomization references this resource by name (`postgres-secret`); the
# actual values live wherever your secret-management tool puts them
# (Sealed Secrets, External Secrets, AWS Secrets Manager, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_DB: finans_db
  POSTGRES_USER: finans_user
  POSTGRES_PASSWORD: change-me-in-production
