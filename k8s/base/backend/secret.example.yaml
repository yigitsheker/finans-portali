# Template — copy to `secret.yaml`, fill real values, and apply OUT-OF-BAND.
# In production, prefer External Secrets Operator or Sealed Secrets so the
# actual values never sit in plaintext in a manifest.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  # TCMB EVDS3 — persistent API key (preferred over session cookies).
  APP_EVDS_API_KEY: ""
  TCMB_EVDS3_JSESSIONID: ""
  TCMB_EVDS3_TS_COOKIE: ""

  # FRED — Federal Reserve Economic Data API key for the US CPI series.
  # Get one free at https://fred.stlouisfed.org/docs/api/api_key.html.
  APP_FRED_API_KEY: ""

  # TEFAS public anonymous bearer token (used by tefas.gov.tr's own SPA;
  # default in source matches this. Override here for rotation.)
  APP_TEFAS_BEARER_TOKEN: "ST-tefaswebwse3irfmSBj4iRAzGPbAlS94Se"

  # Gmail SMTP for transactional email (price alerts, notifications).
  # Use an App Password from https://myaccount.google.com/apppasswords.
  SPRING_MAIL_USERNAME: ""
  SPRING_MAIL_PASSWORD: ""

  # Groq LLM API key for the Analysis-page AI chatbot. Get a free key at
  # https://console.groq.com/keys (gsk_...). Empty → the bot falls back to
  # rule-based canned replies instead of answering finance questions.
  APP_LLM_API_KEY: ""
