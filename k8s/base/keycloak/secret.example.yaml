# Template — copy to `secret.yaml`, fill real values, and apply OUT-OF-BAND.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
type: Opaque
stringData:
  KC_DB_USERNAME: finans_user
  KC_DB_PASSWORD: change-me-in-production
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: change-me-in-production
  # Used by the backend's KeycloakAdminService when calling Keycloak's
  # admin REST API. Must match the secret configured on the
  # `finans-backend-admin` confidential client inside the `finans` realm.
  KC_BACKEND_CLIENT_SECRET: change-me-in-production
