# Post-start patcher for Keycloak: runs the same kcadm.sh script as the
# `keycloak-bootstrap` container in docker-compose. Idempotent — re-runs
# of the Job no-op once everything is in place.
#
# Job lifecycle: backoffLimit=10 so it retries while Keycloak is still
# coming up; `ttlSecondsAfterFinished` cleans the completed pod after
# 5 minutes so `kubectl get jobs` stays readable.
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-bootstrap
  labels:
    app.kubernetes.io/name: keycloak-bootstrap
    app.kubernetes.io/component: auth
  annotations:
    # Re-run on each `kubectl apply -k`. Without this Kustomize would
    # see the same Job spec and skip the apply, leaving stale state.
    # The suffix is generated at apply time by kustomize hash so the
    # Job actually gets recreated when the script ConfigMap changes.
    kustomize.config.k8s.io/needs-hash: "true"
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: quay.io/keycloak/keycloak:26.5.1
          command: ["/bin/sh", "/scripts/keycloak-bootstrap.sh"]
          env:
            - name: KC_URL
              value: http://keycloak:8080
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN
            - name: KC_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: REALM
              value: finans
            - name: BACKEND_CLIENT_ID
              value: finans-backend-admin
            - name: BACKEND_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_BACKEND_CLIENT_SECRET
          volumeMounts:
            - name: bootstrap-script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: bootstrap-script
          configMap:
            name: keycloak-bootstrap-script
            defaultMode: 0755
