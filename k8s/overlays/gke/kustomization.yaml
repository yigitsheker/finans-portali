apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ---------------------------------------------------------------------------
# Google Kubernetes Engine (GKE) overlay
# ---------------------------------------------------------------------------
# Production-ish deploy target on GKE. Differences from base/:
#   - Images come from Artifact Registry (LOCATION-docker.pkg.dev/PROJECT/REPO).
#     The CD workflow rewrites the tag per commit via `kustomize edit set image`,
#     so the `newTag` below is only a sane default for manual applies.
#   - GCE Ingress (the GKE-native L7 HTTP(S) Load Balancer) instead of nginx,
#     fronted by a reserved global static IP and a Google-managed TLS cert.
#   - Services switched to NodePort — the GCE Ingress requires NodePort (or NEG)
#     backends; ClusterIP alone is not routable by the external LB.
#   - BackendConfig CRDs give the LB proper health-check paths per service.
#   - Backend HPA (CPU-based).
#   - Keycloak KC_HOSTNAME + backend issuer-uri point at the public auth domain
#     so the `iss` claim in tokens matches what the browser sees.
#   - A frontend runtime-config ConfigMap carries the public Keycloak URL.
#
# Setup (one-time gcloud commands, WIF, secrets) is documented in
# k8s/GKE_DEPLOYMENT.md. Replace the PLACEHOLDER_* values below (or let the
# CD workflow patch them) before applying.
# ---------------------------------------------------------------------------

namespace: finans-portali

resources:
  - ../../base
  - hpa-backend.yaml
  - managed-certificate.yaml
  - backendconfig.yaml

# Runtime config for the frontend SPA. The image ships an empty
# public/runtime-config.js; we mount a populated one (frontend patch below) so
# the browser learns the PUBLIC Keycloak URL at runtime (keycloak.js reads
# window.__RUNTIME_CONFIG__.VITE_KEYCLOAK_URL). disableNameSuffixHash keeps the
# name stable so the frontend deployment's volume ref resolves. CD's sed fills
# PLACEHOLDER_AUTH_DOMAIN here (it processes kustomization.yaml).
configMapGenerator:
  - name: frontend-runtime-config
    options:
      disableNameSuffixHash: true
    literals:
      - |-
        runtime-config.js=window.__RUNTIME_CONFIG__ = { "VITE_KEYCLOAK_URL": "https://PLACEHOLDER_AUTH_DOMAIN" };

# Images — Artifact Registry. The CD pipeline overrides newTag with the commit
# SHA. For a manual apply, set these to a real digest/tag first.
images:
  - name: <registry>/finans-backend
    newName: PLACEHOLDER_LOCATION-docker.pkg.dev/PLACEHOLDER_PROJECT/finans-portali/finans-backend
    newTag: latest
  - name: <registry>/finans-frontend
    newName: PLACEHOLDER_LOCATION-docker.pkg.dev/PLACEHOLDER_PROJECT/finans-portali/finans-frontend
    newTag: latest
  # Keycloak runs a custom image (base Keycloak + bundled finance-theme login
  # theme; see keycloak/Dockerfile). base/ uses the upstream quay.io image, so
  # we remap that here to our Artifact Registry build. CD sets the SHA tag.
  - name: quay.io/keycloak/keycloak
    newName: PLACEHOLDER_LOCATION-docker.pkg.dev/PLACEHOLDER_PROJECT/finans-portali/finans-keycloak
    newTag: latest

patches:
  # --- Backend: BackendConfig + NodePort -------------------------------------
  - target:
      kind: Service
      name: backend
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: backend
        annotations:
          cloud.google.com/backend-config: '{"default": "backend-bc"}'
      spec:
        type: NodePort

  # --- Backend: replicas, startupProbe, public issuer, Kafka host ------------
  - target:
      kind: Deployment
      name: backend
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: backend
                # Spring Boot + OTel agent + JPA validation takes >60s to come
                # up on GKE. The base liveness probe (initialDelay 60s) fired
                # before the app was listening and killed the pod — an endless
                # restart loop. A startupProbe gates liveness/readiness: neither
                # runs until startup succeeds, tolerating up to 10s*60 = 600s of
                # boot time. The normal liveness probe then governs ongoing health.
                startupProbe:
                  httpGet:
                    path: /actuator/health/liveness
                    port: http
                  periodSeconds: 10
                  failureThreshold: 60
                env:
                  # `nokafka` disables the Log4j2 Kafka appender (see
                  # log4j2-spring.xml's SpringProfile gate). There's no Kafka in
                  # the core GKE deploy; without this every log line tried to
                  # publish to a non-existent broker, adding ~18s of latency to
                  # EVERY API request (per-send metadata lookup + linger). Now
                  # logging is console-only and requests are fast. The
                  # Kafka->OpenSearch pipeline stays available in docker-compose
                  # / local dev (profile off).
                  - name: SPRING_PROFILES_ACTIVE
                    value: prod,nokafka
                  # Public token issuer — must equal what Keycloak stamps into
                  # the token `iss` claim. LB terminates TLS (managed cert), so
                  # the issuer is https. Must match Keycloak's KC_HOSTNAME.
                  - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
                    value: https://PLACEHOLDER_AUTH_DOMAIN/realms/finans

  # --- Frontend: BackendConfig + NodePort ------------------------------------
  - target:
      kind: Service
      name: frontend
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: frontend
        annotations:
          cloud.google.com/backend-config: '{"default": "frontend-bc"}'
      spec:
        type: NodePort

  # --- Frontend: replicas + runtime-config mount -----------------------------
  - target:
      kind: Deployment
      name: frontend
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: frontend
                # Mount the populated runtime-config.js over the image's empty
                # placeholder so the SPA gets the public Keycloak URL.
                volumeMounts:
                  - name: runtime-config
                    mountPath: /usr/share/nginx/html/runtime-config.js
                    subPath: runtime-config.js
            volumes:
              - name: runtime-config
                configMap:
                  name: frontend-runtime-config

  # --- Keycloak: BackendConfig + NodePort ------------------------------------
  - target:
      kind: Service
      name: keycloak
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: keycloak
        annotations:
          cloud.google.com/backend-config: '{"default": "keycloak-bc"}'
      spec:
        type: NodePort

  # --- Keycloak: public hostname over HTTPS ----------------------------------
  - target:
      kind: Deployment
      name: keycloak
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: keycloak
      spec:
        template:
          spec:
            containers:
              - name: keycloak
                # Keycloak (custom image) can take ~60s+ to become ready on a
                # cold node. A startupProbe gates liveness/readiness so the slow
                # first boot can't trip the liveness probe and CrashLoop the pod
                # (10s * 60 = up to 600s of startup budget). Once started, the
                # normal probes govern health. The Dockerfile also runs
                # `kc.sh build` to cut the Quarkus augmentation out of boot time.
                startupProbe:
                  httpGet:
                    path: /realms/master
                    port: 8080
                  periodSeconds: 10
                  failureThreshold: 60
                # Readiness/liveness target the SERVING port 8080 (a known-200
                # realm path), not the 9000 management port — in start-dev the
                # 9000 health endpoints aren't reliably up, which left the pod
                # un-Ready and the LB NEG empty (502). /realms/master always 200s.
                readinessProbe:
                  httpGet:
                    path: /realms/master
                    port: 8080
                livenessProbe:
                  httpGet:
                    path: /realms/master
                    port: 8080
                env:
                  # The LB terminates TLS (Google-managed cert) and forwards
                  # HTTP with X-Forwarded-Proto=https; KC_PROXY_HEADERS=xforwarded
                  # makes Keycloak honour it, so the token `iss` claim comes out
                  # https. KC_HOSTNAME is the bare host (with a scheme + strict
                  # Keycloak 26 rejects the LB health-check's Host) and
                  # hostname-strict=false tolerates the health-check probes.
                  - name: KC_HOSTNAME
                    value: PLACEHOLDER_AUTH_DOMAIN
                  - name: KC_HOSTNAME_STRICT
                    value: "false"
                  - name: KC_PROXY_HEADERS
                    value: xforwarded
                  - name: KC_HTTP_ENABLED
                    value: "true"

  # --- Keycloak BackendConfig health path: /realms/master (8080, always 200) -
  - target:
      kind: BackendConfig
      name: keycloak-bc
    patch: |
      - op: replace
        path: /spec/healthCheck/requestPath
        value: /realms/master

  # --- CORS: allow the public frontend origin --------------------------------
  - target:
      kind: ConfigMap
      name: backend-config
    patch: |
      - op: replace
        path: /data/cors-allowed-origins
        value: https://PLACEHOLDER_APP_DOMAIN

  # --- Ingress: GCE class, global static IP, managed cert, real hosts --------
  - target:
      kind: Ingress
      name: finans-portali
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: finans-portali
        annotations:
          kubernetes.io/ingress.class: "gce"
          kubernetes.io/ingress.global-static-ip-name: "finans-portali-ip"
          # Google-managed TLS cert (provisioned for the two nip.io hosts) +
          # HTTP→HTTPS redirect FrontendConfig. The cert stays in
          # "Provisioning" until the LB is serving and the domains resolve to
          # the static IP (nip.io already does), then flips to Active (~15-60m).
          networking.gke.io/managed-certificates: "finans-portali-cert"
          networking.gke.io/v1beta1.FrontendConfig: "finans-portali-fc"
      spec:
        rules:
          - host: PLACEHOLDER_APP_DOMAIN
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: frontend
                      port:
                        number: 80
          - host: PLACEHOLDER_AUTH_DOMAIN
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: keycloak
                      port:
                        number: 8080
