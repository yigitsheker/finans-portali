apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  # Conservative range for the demo cluster — the wider 3-10 range scaled the
  # backend past the project's GCE quota (FailedScaleUp), starving Keycloak of
  # schedulable capacity. 1-3 keeps the app responsive without exhausting quota.
  minReplicas: 1
  maxReplicas: 3
  metrics:
    # CPU-based scaling. metrics-server is built-in on GKE (Autopilot and
    # Standard), so this works out of the box. For request-rate scaling, add
    # a custom metric via the Prometheus adapter / Cloud Monitoring later.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
