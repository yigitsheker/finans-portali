name: CD — Deploy to GKE

# Continuous Deployment to Google Kubernetes Engine.
#
# Trigger: the CI workflow ("CI") completing on main. GitHub's native
# `workflow_run` gate means we deploy only after CI actually finished — no
# flaky third-party "wait for check" step and no Checks-API permission issues.
# The job `if:` filters to successful CI runs. `workflow_dispatch` keeps a
# manual deploy button that acts on the current main HEAD.
#
# Auth: keyless via Workload Identity Federation (no JSON key in the repo).
# Setup — the gcloud commands that create the WIF pool, the deployer service
# account, Artifact Registry, and the GKE cluster — is in
# k8s/GKE_DEPLOYMENT.md. The repo-level variables / secrets it expects:
#
#   Variables (Settings -> Secrets and variables -> Actions -> Variables):
#     GCP_PROJECT_ID, GCP_REGION, GKE_CLUSTER, GKE_LOCATION,
#     ARTIFACT_REPO, APP_DOMAIN, AUTH_DOMAIN
#   Secrets:
#     GCP_WIF_PROVIDER   projects/NUM/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
#     GCP_DEPLOYER_SA    deployer@PROJECT.iam.gserviceaccount.com

on:
  # PAUSED: auto-deploy on CI completion is disabled while the GKE cluster is
  # torn down for cost. Development happens locally; deploy on demand via
  # "Run workflow" (workflow_dispatch). To re-enable continuous deployment,
  # uncomment the workflow_run block below.
  # workflow_run:
  #   workflows: ["CI"]
  #   types: [completed]
  #   branches: [main]
  workflow_dispatch: {}

# One deploy at a time.
concurrency:
  group: cd-gke
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write          # required for Workload Identity Federation

jobs:
  deploy:
    name: Build images + deploy to GKE
    runs-on: ubuntu-latest
    # Deploy when triggered manually, OR when the CI run that triggered us
    # concluded successfully. Skips deploys for red/cancelled CI runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPO }}
      # On workflow_run, deploy the exact commit CI validated; on manual
      # dispatch, fall back to the ref the workflow was launched against.
      SHA_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # --- Authenticate to Google Cloud (keyless / WIF) --------------------
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      # --- Build + push images (tagged with the commit SHA + latest) -------
      - name: Build & push backend image
        run: |
          docker build -t "$IMAGE_BASE/finans-backend:$SHA_TAG" \
                       -t "$IMAGE_BASE/finans-backend:latest" \
                       ./backend
          docker push "$IMAGE_BASE/finans-backend:$SHA_TAG"
          docker push "$IMAGE_BASE/finans-backend:latest"

      - name: Build & push frontend image
        run: |
          docker build -t "$IMAGE_BASE/finans-frontend:$SHA_TAG" \
                       -t "$IMAGE_BASE/finans-frontend:latest" \
                       ./frontend
          docker push "$IMAGE_BASE/finans-frontend:$SHA_TAG"
          docker push "$IMAGE_BASE/finans-frontend:latest"

      # Custom Keycloak = base image + bundled finance-theme. The Dockerfile
      # COPYs keycloak-themes/ from the repo root, so the build context is "."
      # (not ./keycloak) with -f pointing at the Dockerfile.
      - name: Build & push keycloak image
        run: |
          docker build -f keycloak/Dockerfile \
                       -t "$IMAGE_BASE/finans-keycloak:$SHA_TAG" \
                       -t "$IMAGE_BASE/finans-keycloak:latest" \
                       .
          docker push "$IMAGE_BASE/finans-keycloak:$SHA_TAG"
          docker push "$IMAGE_BASE/finans-keycloak:latest"

      # playwright-service (headless Chromium) powers VIOP + yield-curve scrapes.
      - name: Build & push playwright image
        run: |
          docker build -t "$IMAGE_BASE/finans-playwright:$SHA_TAG" \
                       -t "$IMAGE_BASE/finans-playwright:latest" \
                       ./playwright-service
          docker push "$IMAGE_BASE/finans-playwright:$SHA_TAG"
          docker push "$IMAGE_BASE/finans-playwright:latest"

      # --- Get cluster credentials -----------------------------------------
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_LOCATION }}

      # --- Render the GKE overlay with the real project/domain/tag ---------
      - name: Patch GKE overlay
        working-directory: k8s/overlays/gke
        run: |
          # Pin all images to this commit's SHA tag.
          kustomize edit set image \
            "<registry>/finans-backend=$IMAGE_BASE/finans-backend:$SHA_TAG" \
            "<registry>/finans-frontend=$IMAGE_BASE/finans-frontend:$SHA_TAG" \
            "quay.io/keycloak/keycloak=$IMAGE_BASE/finans-keycloak:$SHA_TAG" \
            "<registry>/finans-playwright=$IMAGE_BASE/finans-playwright:$SHA_TAG"

          # Substitute the PLACEHOLDER_* tokens with the configured project +
          # domains. sed runs over the overlay only; base/ is untouched.
          sed -i \
            -e "s|PLACEHOLDER_LOCATION-docker.pkg.dev/PLACEHOLDER_PROJECT|${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}|g" \
            -e "s|PLACEHOLDER_APP_DOMAIN|${{ vars.APP_DOMAIN }}|g" \
            -e "s|PLACEHOLDER_AUTH_DOMAIN|${{ vars.AUTH_DOMAIN }}|g" \
            kustomization.yaml managed-certificate.yaml

      # --- Apply -----------------------------------------------------------
      - name: Deploy to GKE
        run: kubectl apply -k k8s/overlays/gke

      # --- Wait for rollouts (fail the job if a Deployment doesn't converge)
      # Backend needs generous time on first boot: Spring Boot + JPA schema
      # validation + Keycloak JWK fetch can take a few minutes per replica,
      # and Autopilot may be scaling nodes in parallel. 600s avoids a false
      # red when the deploy is actually fine, just slow to converge.
      - name: Verify rollout
        run: |
          kubectl -n finans-portali rollout status deployment/backend  --timeout=600s
          kubectl -n finans-portali rollout status deployment/frontend --timeout=300s
          kubectl -n finans-portali rollout status deployment/keycloak --timeout=600s

      - name: Summary
        if: always()
        run: |
          {
            echo "### GKE Deploy"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Commit | \`$SHA_TAG\` |"
            echo "| Backend image | \`$IMAGE_BASE/finans-backend:$SHA_TAG\` |"
            echo "| Frontend image | \`$IMAGE_BASE/finans-frontend:$SHA_TAG\` |"
            echo "| Cluster | ${{ vars.GKE_CLUSTER }} (${{ vars.GKE_LOCATION }}) |"
            echo "| App URL | https://${{ vars.APP_DOMAIN }} |"
            echo "| Auth URL | https://${{ vars.AUTH_DOMAIN }} |"
          } >> "$GITHUB_STEP_SUMMARY"
