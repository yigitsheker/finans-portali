name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel older runs on the same branch when a newer commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      # `verify` runs unit + slice tests AND generates the JaCoCo report.
      # The full @SpringBootTest is @Disabled (needs live Keycloak); everything
      # else runs against H2 + mocked HTTP clients.
      - name: Build + test
        run: ./mvnw -B -ntp verify

      # Surface coverage in the GitHub UI without needing the artifact.
      - name: Coverage summary
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.xml ]; then
            python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          root = ET.parse('target/site/jacoco/jacoco.xml').getroot()
          print("### JaCoCo coverage\n")
          print("| Metric | Covered / Total | % |")
          print("|---|---:|---:|")
          for c in root.findall('counter'):
              cov = int(c.get('covered')); miss = int(c.get('missed'))
              tot = cov + miss
              pct = (100.0 * cov / tot) if tot else 0
              print(f"| {c.get('type').title()} | {cov} / {tot} | {pct:.2f}% |")
          PY
          else
            echo "JaCoCo report missing — tests may have failed before the report phase." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Frontend (Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      # Lint is intentionally not run here yet — there are ~160 pre-existing
      # unused-import errors left over from the TS→JS conversion plus an
      # ESLint parser version mismatch on numeric separators. Once those are
      # cleaned up, add `- run: npm run lint` above `npm run build`.
      - name: Build
        run: npm run build

  playwright-service:
    name: Playwright service (deps install + syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No lockfile here, so use `install` rather than `ci`. The Dockerfile
      # uses `npm install --omit=dev` for the same reason; keeping CI aligned.
      - name: Install deps
        run: npm install --omit=dev

      - name: Syntax-check entrypoint
        run: node --check server.js

  compose-config:
    name: docker-compose syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the example file as the dev .env so all ${VAR} interpolations
      # resolve. Empty values are fine here — we're only checking that the
      # compose file itself parses, not that the stack starts.
      - name: Stage env file
        run: cp .env.example .env

      - name: Validate compose file
        run: docker compose config > /dev/null

  # SonarCloud analysis — backend (with JaCoCo coverage from the test suite)
  # plus frontend JS/JSX static analysis plus compose / Dockerfile lints.
  # See sonar-project.properties for source paths and exclusions.
  #
  # Skipped when the secret is missing so forks / PRs from outside contributors
  # don't choke on the missing SONAR_TOKEN. Maintainer PRs and main pushes
  # have the secret and run the scan.
  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          # SonarCloud needs full git history for accurate "new code" blame
          # attribution. Shallow clones break the Quality Gate's "new code"
          # delta calculation.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      # Produce the JaCoCo XML report Sonar expects under
      # backend/target/site/jacoco/jacoco.xml. We run `verify` because that's
      # the lifecycle phase JaCoCo's report goal is bound to.
      - name: Backend test + JaCoCo coverage
        working-directory: backend
        run: ./mvnw -B -ntp verify

      # v4 is deprecated (security advisory); v6 is the current LTS.
      # See https://community.sonarsource.com/gha-v6-update
      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
