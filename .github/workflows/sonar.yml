name: SonarCloud

# SonarCloud analysis — split out of CI so it doesn't run on every push.
#
# Why separate: the scan (backend `mvnw verify` + JaCoCo + the SonarCloud
# scanner) was taking ~1h of wall-clock and burning Actions minutes on every
# commit, and because CD is gated on the "CI" workflow completing, a slow scan
# also delayed every deploy. Pulling it into its own workflow keeps CI fast
# (~2-3 min: build + tests only) and lets the deploy pipeline move quickly.
#
# When it runs:
#   - Manually:  Actions -> SonarCloud -> Run workflow (workflow_dispatch)
#   - Weekly:    Mondays 06:00 UTC (cron) on the default branch
#
# The Quality Gate is unchanged (sonar-project.properties); it's just measured
# on demand / weekly instead of per-commit.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"   # her Pazartesi 06:00 UTC

# Don't pile up scans; a newer run cancels an in-flight one.
concurrency:
  group: sonarcloud
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    # Headroom for the ONE-TIME cache-warming run; once SonarCloud's analysis
    # cache is populated, subsequent scans finish in a few minutes.
    timeout-minutes: 45
    # Skip if the token isn't available (e.g. on a fork without the secret).
    if: ${{ github.repository == 'yigitsheker/finans-portali' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # SonarCloud needs full git history for accurate "new code" blame
          # attribution. Full clone (with blobs) keeps blame LOCAL and fast — a
          # `blob:none` partial clone makes Sonar's blame fetch each historical
          # blob on demand over the network, which is far slower.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      # Produce the JaCoCo XML report Sonar expects under
      # backend/target/site/jacoco/jacoco.xml. JaCoCo's report goal is bound to
      # the `test` phase (see pom.xml), so `test` is enough — we skip the
      # `package`/`verify` phases (Spring Boot fat-jar repackage etc.), which
      # Sonar doesn't need. Tests run in 2 parallel forks (each an isolated JVM,
      # so the H2/@SpringBootTest suites can't collide); JaCoCo appends per fork.
      - name: Backend test + JaCoCo coverage
        working-directory: backend
        run: ./mvnw -B -ntp -DforkCount=2 -DreuseForks=true test

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
