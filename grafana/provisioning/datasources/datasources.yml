# Grafana Datasource Provisioning
# Automatically configures Prometheus and Jaeger datasources

apiVersion: 1

datasources:
  # Prometheus datasource for metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      queryTimeout: 60s
      httpMethod: POST
    version: 1

  # Jaeger datasource for traces
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: 'opensearch'
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        tags: ['traceId']
        filterByTraceID: true
        filterBySpanID: false
    version: 1
