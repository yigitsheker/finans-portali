# Grafana Datasource Provisioning
# Automatically configures Prometheus and Jaeger datasources

apiVersion: 1

datasources:
  # Prometheus datasource for metrics.
  # Explicit `uid: prometheus` so the provisioned dashboards (which hard-code
  # this UID in every panel's "datasource" field) bind to it. Without an
  # explicit UID Grafana generates a random one and the dashboards render
  # "No data" because they reference a UID that doesn't exist.
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      queryTimeout: 60s
      httpMethod: POST
    version: 1

  # Jaeger datasource for traces
  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: 'opensearch'
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        tags: ['traceId']
        filterByTraceID: true
        filterBySpanID: false
    version: 1
