         Container deploys replace /runtime-config.js with a ConfigMap holding
         environment values (e.g. the public Keycloak URL). The shipped default
         in public/runtime-config.js is empty, so local dev falls back to
         build-time env / dev defaults. -->
    <script src="/runtime-config.js"></script>

  </body>
