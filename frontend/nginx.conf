server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Handle React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html ASLA cache'lenmesin — yeni deploy'da kullanıcı eski bundle
    # hash'ine takılı kalmasın. Hash'lenmiş JS/CSS dosyaları aşağıda 1y cache'leniyor.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }
    
    # API proxy to backend. Resolve the hostname per-request via Docker's
    # embedded DNS (127.0.0.11) instead of pinning the IP once at startup —
    # otherwise a backend container restart (new IP) leaves nginx stuck on a
    # dead upstream (502 Bad Gateway) until the frontend is also restarted.
    # Using a variable in proxy_pass is what forces nginx to re-resolve.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream "finans-backend:8080";
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}