<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detaylı Grafik - Finans Portali</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            overflow: hidden;
        }
        #root {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .symbol-info h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .symbol-info p {
            font-size: 14px;
            color: #7d8590;
        }
        .back-btn {
            padding: 8px 16px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            cursor: pointer;
            font-size: 14px;
        }
        .back-btn:hover {
            background: #30363d;
        }
        #tradingview_widget {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="header">
            <button class="back-btn" onclick="window.close()">← Kapat</button>
            <div class="symbol-info">
                <h1 id="symbol-name">Yükleniyor...</h1>
                <p id="symbol-desc"></p>
            </div>
            <div></div>
        </div>
        <div id="tradingview_widget"></div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Get symbol from URL
        const urlParams = new URLSearchParams(window.location.search);
        const symbol = urlParams.get('symbol') || 'THYAO';
        
        // Symbol mapping
        const SYMBOL_MAP = {
            "THYAO": "BIST:THYAO",
            "GARAN": "BIST:GARAN",
            "AKBNK": "BIST:AKBNK",
            "EREGL": "BIST:EREGL",
            "SAHOL": "BIST:SAHOL",
            "SISE": "BIST:SISE",
            "ASELS": "BIST:ASELS",
            "KCHOL": "BIST:KCHOL",
            "TUPRS": "BIST:TUPRS",
            "PETKM": "BIST:PETKM",
            "TCELL": "BIST:TCELL",
            "ISCTR": "BIST:ISCTR",
            "VAKBN": "BIST:VAKBN",
            "ENKAI": "BIST:ENKAI",
            "KOZAL": "BIST:KOZAL",
            "BIMAS": "BIST:BIMAS",
            "TTKOM": "BIST:TTKOM",
            "PGSUS": "BIST:PGSUS",
            "FROTO": "BIST:FROTO",
            "TOASO": "BIST:TOASO",
            "HALKB": "BIST:HALKB",
            "ARCLK": "BIST:ARCLK",
            "KOZAA": "BIST:KOZAA",
            "TAVHL": "BIST:TAVHL",
            "SODA": "BIST:SODA",
            "XU100": "BIST:XU100",
            "XU030": "BIST:XU030",
            "USDTRY": "FX:USDTRY",
            "EURTRY": "FX:EURTRY",
            "GBPTRY": "FX:GBPTRY",
            "BTCUSD": "BINANCE:BTCUSDT",
            "ETHUSD": "BINANCE:ETHUSDT",
            "SOLUSD": "BINANCE:SOLUSDT",
            "XAUUSD": "OANDA:XAUUSD",
            "XAGUSD": "OANDA:XAGUSD",
            "AAPL": "NASDAQ:AAPL",
            "MSFT": "NASDAQ:MSFT",
            "GOOGL": "NASDAQ:GOOGL",
            "AMZN": "NASDAQ:AMZN",
            "NVDA": "NASDAQ:NVDA",
            "TSLA": "NASDAQ:TSLA",
            "META": "NASDAQ:META",
            "IXIC": "NASDAQ:IXIC",
            "SPX": "SP:SPX",
            "DJI": "DJ:DJI",
        };

        const tvSymbol = SYMBOL_MAP[symbol] || `BIST:${symbol}`;
        
        // Update header
        document.getElementById('symbol-name').textContent = symbol;
        document.getElementById('symbol-desc').textContent = tvSymbol;

        // Create TradingView widget
        new TradingView.widget({
            container_id: "tradingview_widget",
            autosize: true,
            symbol: tvSymbol,
            interval: "D",
            timezone: "Europe/Istanbul",
            theme: "dark",
            style: "1",
            locale: "tr",
            toolbar_bg: "#161b22",
            enable_publishing: false,
            hide_top_toolbar: false,
            hide_legend: false,
            save_image: true,
            allow_symbol_change: true,
            studies: [
                "MASimple@tv-basicstudies",
                "RSI@tv-basicstudies",
                "MACD@tv-basicstudies",
                "Volume@tv-basicstudies"
            ],
            show_popup_button: true,
            popup_width: "1000",
            popup_height: "650",
        });
    </script>
</body>
</html>
