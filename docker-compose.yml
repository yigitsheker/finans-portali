# YAML anchor for log rotation — applied to every service via `logging: *default-logging`.
# Max 30MB per container (3 × 10MB rolling files). Prevents disk fill from runaway logs.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # OpenLDAP Directory Server
  openldap:
    build:
      context: ./ldap
      dockerfile: Dockerfile
    image: finans-portali-openldap:latest
    container_name: finans-openldap
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    environment:
      LDAP_ORGANISATION: "Finance Portal"
      LDAP_DOMAIN: "finance.local"
      LDAP_BASE_DN: "dc=finance,dc=local"
      LDAP_ADMIN_PASSWORD: "admin_password"
      LDAP_CONFIG_PASSWORD: "config_password"
      LDAP_READONLY_USER: "false"
      LDAP_RFC2307BIS_SCHEMA: "false"
      LDAP_BACKEND: "mdb"
      LDAP_TLS: "false"
      LDAP_REPLICATION: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "true"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost -b dc=finance,dc=local -D 'cn=admin,dc=finance,dc=local' -w admin_password"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # phpLDAPadmin - LDAP Management UI (Development Only)
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: finans-phpldapadmin
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8089:80"
    depends_on:
      - openldap
    networks:
      - finans-network

  # Zookeeper - Kafka Coordination Service
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finans-zookeeper
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    environment:
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx192m"
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Auto-purge old snapshots+txn logs every hour, keep last 3
      ZOOKEEPER_AUTOPURGE_SNAP_RETAIN_COUNT: 3
      ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL: 1
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "srvr,mntr,ruok,conf"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kafka - Message Broker for Logs
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finans-kafka
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # 48h retention + 500MB hard cap per partition — app logs, not critical
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_LOG_RETENTION_BYTES: 524288000
      KAFKA_LOG_SEGMENT_BYTES: 134217728
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: finans-postgres
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      POSTGRES_DB: finans_db
      POSTGRES_USER: finans_user
      POSTGRES_PASSWORD: finans_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finans_user -d finans_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak Authentication Server
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.1
    container_name: finans-keycloak
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    environment:
      JAVA_OPTS_APPEND: "-Xms256m -Xmx640m"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: finans_user
      KC_DB_PASSWORD: finans_password
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true
      # Development: Disable theme caching for easier development
      KC_SPI_THEME_STATIC_MAX_AGE: -1
      KC_SPI_THEME_CACHE_THEMES: false
      KC_SPI_THEME_CACHE_TEMPLATES: false
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
      openldap:
        condition: service_healthy
    volumes:
      - ./keycloak-themes:/opt/keycloak/themes
      - ./keycloak:/opt/keycloak/data/import:ro
    networks:
      - finans-network
    command: ["start-dev", "--import-realm"]
    healthcheck:
      # Keycloak 26's UBI-minimal image ships without curl or wget, so the
      # original `curl -f` probe failed with "command not found" on every
      # tick and the container sat "unhealthy" forever despite serving
      # traffic just fine (host hits :8090/realms/finans → HTTP 200).
      #
      # bash's built-in /dev/tcp/<host>/<port> redirection opens a raw TCP
      # connection and closes it — no helper binaries needed. Good enough
      # for a "is Keycloak's HTTP listener accepting?" probe; the kc.sh
      # CLI doesn't have a `health` subcommand on 26.x.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && exec 3<&- 3>&- || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Keycloak Bootstrap - idempotent post-start patcher
  # Ensures rememberMe + finans-backend-admin client + realm-management roles
  # are in place, even when --import-realm skips an existing realm.
  # Re-runs on every `docker compose up`; no-op if already applied.
  keycloak-bootstrap:
    image: quay.io/keycloak/keycloak:26.5.1
    container_name: finans-keycloak-bootstrap
    logging: *default-logging
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    environment:
      KC_URL: http://keycloak:8080
      KC_ADMIN_USER: admin
      KC_ADMIN_PASS: admin
      REALM: finans
      BACKEND_CLIENT_ID: finans-backend-admin
      BACKEND_CLIENT_SECRET: ${KC_BACKEND_CLIENT_SECRET}
    depends_on:
      keycloak:
        condition: service_started
    volumes:
      - ./scripts/keycloak-bootstrap.sh:/bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    networks:
      - finans-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finans-backend
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.5G
    environment:
      JDK_JAVA_OPTIONS: "-Xms256m -Xmx1024m"
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finans_db
      SPRING_DATASOURCE_USERNAME: finans_user
      SPRING_DATASOURCE_PASSWORD: finans_password
      
      # Keycloak
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8090/realms/finans
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/finans/protocol/openid-connect/certs

      # Keycloak Admin API (service account)
      APP_KEYCLOAK_SERVER_URL: http://keycloak:8080
      APP_KEYCLOAK_REALM: finans
      APP_KEYCLOAK_ADMIN_CLIENT_ID: finans-backend-admin
      APP_KEYCLOAK_ADMIN_CLIENT_SECRET: ${KC_BACKEND_CLIENT_SECRET}
      
      # Email — Gmail SMTP. Gmail does NOT accept regular account passwords
      # over SMTP; you must generate an App Password (2-Step Verification
      # has to be on first):
      #   https://myaccount.google.com/apppasswords
      # USERNAME is the full Gmail address; PASSWORD is the 16-char App
      # Password (paste without spaces). APP_MAIL_FROM matches the username
      # so the From-header is authenticated.
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${GMAIL_SMTP_USERNAME}
      SPRING_MAIL_PASSWORD: ${GMAIL_SMTP_APP_PASSWORD}
      APP_MAIL_FROM: ${GMAIL_SMTP_USERNAME}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "true"
      SPRING_MAIL_PROPERTIES_MAIL_DEBUG: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST: "smtp.gmail.com"
      APP_BASE_URL: http://localhost
      
      # Application
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080

      # TCMB EVDS3 — preferred auth is the persistent API key. Session
      # cookies remain as a fallback for the path the SPA hands out.
      APP_EVDS_API_KEY: ${EVDS_API_KEY:-}
      TCMB_EVDS3_JSESSIONID: ${TCMB_EVDS3_JSESSIONID:-}
      TCMB_EVDS3_TS_COOKIE: ${TCMB_EVDS3_TS_COOKIE:-}

      # FRED (Federal Reserve Economic Data) API key for US CPI on the
      # inflation page. Free key — register at fred.stlouisfed.org. When
      # empty the US series is skipped on refresh and the API returns an
      # empty list for ?country=US.
      APP_FRED_API_KEY: ${APP_FRED_API_KEY:-}

      # Headless-browser fetcher — used as a last-resort fallback for
      # Cloudflare-protected pages (e.g. some news sites) when both Jsoup
      # and system curl get blocked.
      APP_PLAYWRIGHT_SERVICE_URL: http://playwright-service:3000

      # LibreTranslate — self-hosted translation API for the news pipeline
      # (TR↔EN). Empty string disables translation entirely (articles will be
      # served in their source language regardless of the user's lang pref).
      APP_LIBRETRANSLATE_URL: http://libretranslate:5000

      # Analysis-page AI chatbot. OpenAI-compatible endpoint. Defaults to
      # Groq's free /openai/v1 with llama-3.3-70b — drop a key into
      # APP_LLM_API_KEY (e.g. from https://console.groq.com/keys) to enable
      # real LLM replies; leave empty to fall back to the local mock.
      APP_LLM_BASE_URL: ${APP_LLM_BASE_URL:-https://api.groq.com/openai/v1}
      APP_LLM_API_KEY: ${APP_LLM_API_KEY:-}
      APP_LLM_MODEL: ${APP_LLM_MODEL:-llama-3.3-70b-versatile}
      
      # Logging
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_FINANSPORTALI: INFO
      
      # OpenTelemetry Java Agent Configuration
      OTEL_SERVICE_NAME: finans-backend
      OTEL_RESOURCE_ATTRIBUTES: service.name=finans-backend,service.version=1.0.0,deployment.environment=dev
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      OTEL_TRACES_SAMPLER: always_on
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_INSTRUMENTATION_COMMON_DEFAULT_ENABLED: true
      OTEL_INSTRUMENTATION_SPRING_WEBMVC_ENABLED: true
      OTEL_INSTRUMENTATION_SPRING_WEBFLUX_ENABLED: true
      OTEL_INSTRUMENTATION_JDBC_ENABLED: true
      OTEL_INSTRUMENTATION_HIBERNATE_ENABLED: true
      OTEL_INSTRUMENTATION_HTTP_CLIENT_ENABLED: true
      # Security: Exclude sensitive headers from traces
      OTEL_INSTRUMENTATION_HTTP_CAPTURE_HEADERS_SERVER_REQUEST: ""
      OTEL_INSTRUMENTATION_HTTP_CAPTURE_HEADERS_SERVER_RESPONSE: ""
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_started
      keycloak:
        condition: service_started
      keycloak-bootstrap:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
      kafka:
        condition: service_started
      playwright-service:
        condition: service_started
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Headless Chrome fetcher — fallback HTTP client for sites that
  # Cloudflare-challenge or TLS-fingerprint Java. Used by NewsContentFetcher
  # as a last resort when Jsoup and curl both come back empty/blocked.
  playwright-service:
    build:
      context: ./playwright-service
      dockerfile: Dockerfile
    container_name: finans-playwright
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # LibreTranslate — self-hosted FOSS translation API. Used by NewsService to
  # translate Turkish RSS articles to English (and vice-versa) on demand,
  # caching results back into news_articles.{title,summary,content}_translated.
  #
  # `LT_LOAD_ONLY=tr,en` pre-downloads ONLY the TR↔EN model on first boot
  # (one ~70MB file) instead of pulling every Argos language pair (~2GB total).
  # `LT_DISABLE_WEB_UI=true` strips the demo UI since we only consume the API.
  # Models persist in libretranslate_data volume so subsequent restarts skip
  # the download.
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: finans-libretranslate
    logging: *default-logging
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: "tr,en"
      LT_DISABLE_WEB_UI: "true"
      LT_UPDATE_MODELS: "false"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1.5G
    # Intentionally no model-cache volume. A named-volume mount lands owned by
    # root, but LibreTranslate runs as the `libretranslate` user inside the
    # image and fails with PermissionError trying to write to ~/.local/share.
    # The tr+en model is ~70MB and downloads in ~30s, so re-downloading on
    # container restart is the cheapest fix for dev.
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/languages || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 120s

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finans-frontend
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # OpenSearch - Centralized Log Storage
  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: finans-opensearch
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms384m -Xmx384m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Log Consumer - Kafka to OpenSearch
  log-consumer:
    build:
      context: ./log-consumer
      dockerfile: Dockerfile
    container_name: finans-log-consumer
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
    environment:
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      OPENSEARCH_SCHEME: http
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # OpenSearch Dashboards - Log Visualization
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.1
    container_name: finans-opensearch-dashboards
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=true"
      # Note: don't try to pass NEWSFEED_ENABLED / TELEMETRY_* — OpenSearch
      # Dashboards 2.x removed those config keys entirely (they were Kibana
      # 7.x carry-overs). Setting them aborts boot with exit 64:
      #   "InvalidConfigurationError: Unknown configuration key(s):
      #    newsfeed.enabled, telemetry.enabled, telemetry.optIn"
      # Telemetry / newsfeed don't ship in OpenSearch Dashboards anyway,
      # so removing the env vars is the fix — not adding new ones.
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # NOTE: fluent-bit was removed on 2026-05-26. The canonical log pipeline
  # is now backend (logback KafkaAppender) -> Kafka topic `finans-logs`
  # -> log-consumer -> OpenSearch index `finans-logs-YYYY-MM-DD`. Keeping
  # two parallel shippers wrote to two separate indices and made queries
  # ambiguous. See log-consumer/ for the consumer side.

  # Jaeger - Distributed Tracing Backend
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: finans-jaeger
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=10000
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:16686/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # OpenTelemetry Collector - Telemetry Data Pipeline
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.93.0
    container_name: finans-otel-collector
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4319:4317"    # OTLP gRPC receiver (mapped to avoid conflict with Jaeger)
      - "4320:4318"    # OTLP HTTP receiver (mapped to avoid conflict with Jaeger)
      - "8888:8888"    # Prometheus metrics (internal)
      - "8889:8889"    # Prometheus exporter
    depends_on:
      jaeger:
        condition: service_healthy
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:13133/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Prometheus - Metrics Storage and Querying
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: finans-prometheus
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
      - backend
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Grafana - Metrics Visualization and Dashboards
  grafana:
    image: grafana/grafana:10.2.3
    container_name: finans-grafana
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Public URL reflects the published host port. Windows/Hyper-V (WinNAT)
      # reserves shifting dynamic port ranges; after a reboot the reserved
      # block moved to 3048-3147, which trapped the previous :3100 (we hit
      # "bind: An attempt was made to access a socket in a way forbidden by
      # its access permissions"). :3300 is outside every current reserved
      # range — check `netsh interface ipv4 show excludedportrange protocol=tcp`
      # if this ever recurs.
      - GF_SERVER_ROOT_URL=http://localhost:3300
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3300:3000"
    depends_on:
      - prometheus
    networks:
      - finans-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  finans-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  ldap_data:
    driver: local
  ldap_config:
    driver: local
  opensearch_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local
